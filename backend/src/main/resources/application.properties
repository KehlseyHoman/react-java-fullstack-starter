# Server
server.port=8080

# --- H2 in-memory database ---
# H2 lives entirely in the backend's memory -- there's no separate database program to
# install or run. The tradeoff: every time you stop the backend, all data disappears.
# That's intentional for a learning project: nothing to configure, always a clean slate.
#
# TODO (Feature 6 in the README roadmap): swap this out for PostgreSQL (or a hosted
# Postgres like Supabase) once you want data to actually persist between restarts.
# That mainly means changing these four lines to a Postgres connection string/driver,
# plus adding the Postgres dependency to pom.xml instead of H2.
spring.datasource.url=jdbc:h2:mem:choretracker
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Tells Hibernate to automatically create/update database tables based on your @Entity
# classes (like Chore.java) -- you don't hand-write CREATE TABLE statements.
spring.jpa.hibernate.ddl-auto=update
# Prints the actual SQL Hibernate generates to your terminal -- handy for seeing what's
# really happening under the hood while you're learning.
spring.jpa.show-sql=true

# H2's built-in web console, so you can peek at your data directly in a browser instead
# of only trusting what the API says. While the backend is running, visit:
#   http://localhost:8080/h2-console
# and log in with JDBC URL: jdbc:h2:mem:choretracker, username: sa, no password.
spring.h2.console.enabled=true
