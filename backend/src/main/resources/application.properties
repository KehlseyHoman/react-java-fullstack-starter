# Server
server.port=8080

# H2 in-memory database -- data resets every time you restart the app.
# This is intentional for a learning project: no install, no setup, always a clean slate.
spring.datasource.url=jdbc:h2:mem:choretracker
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Lets Hibernate create/update tables automatically from the @Entity classes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 web console, handy for poking at the data directly in a browser.
# Visit http://localhost:8080/h2-console while the backend is running.
# JDBC URL to use on that login screen: jdbc:h2:mem:choretracker
spring.h2.console.enabled=true
